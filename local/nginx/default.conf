# Chỉ HTTP — TLS do gateway (docker) xử lý. server_name khớp INTERNAL_API_HOST trên gateway.
server {
    listen 80;
    server_name laravel.api.com;

    resolver 127.0.0.11 valid=10s ipv6=off;

    root /var/www/api/src/public;
    index index.php index.html;

    location = /coverage {
        return 301 /coverage/;
    }

    location ^~ /coverage/ {
        alias /var/www/api/src/coverage/;
        index index.html;
        try_files $uri $uri/ /coverage/index.html;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include fastcgi_params;
        set $php_upstream api-php:9000;
        fastcgi_pass $php_upstream;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }

    location ~ /\.ht {
        deny all;
    }
}
