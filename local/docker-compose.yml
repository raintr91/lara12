# Stack Laravel (PHP-FPM + nginx HTTP). TLS chỉ ở gateway docker; publish một cổng HTTP ra host.
# Network `base_shared_net` do stack docker/ tạo — `docker compose up` (repo root hoặc thư mục docker/) trước api.
# Nếu chưa có mạng: lỗi "network ... not found" → chạy shared stack trước hoặc: docker network create base_shared_net
#
#   cd api/local && docker compose up -d
#   cd api/local && docker compose --env-file .env up -d   # override prefix / port / network
#
# Tên project & container: API_STACK_PREFIX trong .env (vd base, p1) — tránh trùng khi nhiều clone cùng network.
# Tên service nội bộ (api-php) giữ cố định để nginx fastcgi_pass không đổi.

name: api-${API_STACK_PREFIX:-base}

services:
  api-php:
    container_name: ${API_STACK_PREFIX:-base}-api-php
    build:
      context: ..
      dockerfile: local/php/Dockerfile
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    working_dir: /var/www/api/src
    volumes:
      - ..:/var/www/api
      - ./php/php.ini:/usr/local/etc/php/conf.d/custom.ini:ro
    networks:
      - shared

  api-nginx:
    container_name: ${API_STACK_PREFIX:-base}-api-nginx
    image: nginx:1.27-alpine
    depends_on:
      - api-php
    volumes:
      - ..:/var/www/api
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "${API_NGINX_HTTP_PORT:-18080}:80"
    networks:
      - shared

networks:
  shared:
    name: ${BASE_SHARED_NETWORK_NAME:-base_shared_net}
    external: true
