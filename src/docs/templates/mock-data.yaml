feature: feature-slug
mocks:
  feature.search.success:
    endpoint: feature.search
    status: 200
    response:
      data:
        - id: 1
          name: Example
      meta:
        current_page: 1
        per_page: 15
        total: 1

  feature.create.validation:
    endpoint: feature.create
    status: 422
    response:
      message: The given data was invalid.
      errors:
        name:
          - The name field is required.
