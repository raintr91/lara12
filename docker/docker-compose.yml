# Local dev — TLS ở gateway docker/; join base_shared_net, không publish port ra host.
# Chạy gateway trước: make d-up-all (repo workspace docker/)
#
#   cd api/docker && docker compose --env-file .env up -d
#
# Container: <API_STACK_PREFIX>-api-php / <API_STACK_PREFIX>-api-nginx
# Gateway: api.stack trong docker/routes.json khớp API_STACK_PREFIX

name: api-${API_STACK_PREFIX:-base}

services:
  api-php:
    container_name: ${API_STACK_PREFIX:-base}-api-php
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: dev
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    working_dir: /var/www/api/src
    volumes:
      - ..:/var/www/api
    networks:
      - shared

  api-nginx:
    container_name: ${API_STACK_PREFIX:-base}-api-nginx
    image: nginx:1.27-alpine
    depends_on:
      - api-php
    volumes:
      - ..:/var/www/api
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - shared

networks:
  shared:
    name: ${BASE_SHARED_NETWORK_NAME:-base_shared_net}
    external: true
